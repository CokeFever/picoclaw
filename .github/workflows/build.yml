name: build

# Disabled: telego v1.6.0 has a bug requiring non-existent Go 1.25.5
# This workflow is not required for PR submission
# The upstream pr.yml workflow will handle all necessary checks
on:
  workflow_dispatch:  # Only allow manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GOTOOLCHAIN: auto
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        run: make build-all
